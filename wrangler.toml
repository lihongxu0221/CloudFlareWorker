# Cloudflare Git / wrangler deploy 使用本文件（可提交仓库）
# 密钥请用 Dashboard Secrets 或 wrangler secret put，切勿写入本文件
name = "grokreg1"
main = "grokreg.worker.js"
compatibility_date = "2024-11-01"

[vars]
DOMAIN = "juc114.cn"
QQ_MAIL_HOST = "pop.qq.com"
QQ_MAIL_PORT = "995"
QQ_IMAP_HOST = "imap.qq.com"
QQ_IMAP_PORT = "993"
# 默认开启 IMAP 删信（QQ 网页端同步删除）；仅 POP3 时设为 "0"
# QQ_IMAP_DELETE = "0"
QQ_FETCH_LIMIT = "20"
# 并发多账号注册时建议取消下一行注释
# QQ_STRICT_ALIAS_MATCH = "1"

# 必填密钥（不要写在本文件）：
#   QQ_MAIL_USER
#   QQ_MAIL_AUTH_CODE
#
# 兼容别名（二选一即可，与 Worker 代码一致）：
#   QQ_MAIL_USER      ≡ QQ_MAIL_ACCOUNT
#   QQ_MAIL_AUTH_CODE ≡ QQ_MAIL_PASSWORD
#   QQ_IMAP_HOST      ≡ IMAP_HOST
#   QQ_IMAP_PORT      ≡ IMAP_PORT
